name: Publish Package to GitHub NPM Registry

on: 
  release:
    types: [published] 
    
jobs:
  npm-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
          
      - name: Install/Set up NodeJS
        uses: actions/setup-node@v4  # Changed v6 to v4
        with:
          node-version: '20.x'
          registry-url: 'https://github.com' # Added this line

      - name: Install NPM Dependencies
        run: npm install 
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: NPM Publish
        run: npm publish 
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Publish Package to GitHub NPM Registry

on: 
  release :
    types : [published] 
    
jobs:
    npm-package:
      runs-on: ubuntu-latest
      permissions :
        contents : read
        packages : write
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4
          
        - name : install/set up NodeJS
          uses : actions/node@v4
          with :
            node-version : 20.x
            registry-url: 'https://github.com'

        - name : Install NPM Dependencies
          run : npm install 
          env :
            NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        - name : NPM Publish
          run : npm publish 
          env :
            NODE_AUTH_TOKEN : ${{secrets.GITHUB_TOKEN}}